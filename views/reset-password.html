<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сброс пароля</title>
    <link rel="icon" type="image/x-icon" href="/images/logo.ico">
    <link rel="shortcut icon" href="/images/logo.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="/images/logo-small.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/images/logo-small.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/images/logo-small.png">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/logo.css">
    <style>
        .password-container {
            position: relative;
            display: flex;
            align-items: center;
        }
        
        .password-container input {
            flex: 1;
            padding-right: 40px;
        }
        
        .toggle-password {
            position: absolute;
            right: 10px;
            cursor: pointer;
            user-select: none;
            font-size: 1.2rem;
            color: #666;
        }
        
        .toggle-password:hover {
            color: #bf5254;
        }
        
        .password-strength {
            font-size: 0.8rem;
            margin-top: 5px;
            min-height: 20px;
        }
        
        .password-strength.weak {
            color: #f56565;
        }
        
        .password-strength.medium {
            color: #ecc94b;
        }
        
        .password-strength.strong {
            color: #48bb78;
        }
        
        .password-requirements {
            font-size: 0.75rem;
            color: #666;
            margin-top: 8px;
            padding: 8px;
            background: #f8f9fa;
            border-radius: 5px;
        }
        
        .password-requirements ul {
            margin: 5px 0 0 20px;
            padding: 0;
        }
        
        .password-requirements li {
            margin-bottom: 3px;
        }
        
        .password-requirements li.valid {
            color: #48bb78;
            text-decoration: line-through;
        }
        
        .error-message {
            color: #f56565;
            font-size: 0.85rem;
            margin-top: 5px;
        }
        
        .success-message {
            color: #48bb78;
            font-size: 0.85rem;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="/" class="logo-container">
                <img src="/images/company1.png" alt="Компания 1" class="logo-image">
                <span class="logo-cross logo-cross-black"></span>
                <img src="/images/company2.png" alt="Компания 2" class="logo-image logo-text">
            </a>
            <div class="nav-links">
                <a href="/">Главная</a>
                <a href="/login">Вход</a>
                <a href="/register">Регистрация</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div style="max-width: 400px; margin: 50px auto;">
            <div class="card">
                <div class="card-header">
                    <h2>Сброс пароля</h2>
                </div>
                
                <div id="alert" class="alert" style="display: none;"></div>
                
                <form id="resetPasswordForm">
                    <div class="form-group">
                        <label for="password">Новый пароль</label>
                        <div class="password-container">
                            <input type="password" id="password" name="password" required minlength="6"
                                   pattern="[a-zA-Z0-9!@#$%^&*]+"
                                   title="Только латинские буквы, цифры и спецсимволы (!@#$%^&*)">
                            <span class="toggle-password" onclick="togglePassword('password')">👁️</span>
                        </div>
                        <div id="passwordStrength" class="password-strength"></div>
                        <div class="password-requirements">
                            <strong>Требования к паролю:</strong>
                            <ul id="passwordRequirements">
                                <li id="reqLength">✓ Минимум 6 символов</li>
                                <li id="reqLatin">✓ Только латинские буквы</li>
                                <li id="reqUppercase">✓ Хотя бы одна заглавная буква (A-Z)</li>
                                <li id="reqLowercase">✓ Хотя бы одна строчная буква (a-z)</li>
                                <li id="reqNumber">✓ Хотя бы одна цифра (0-9)</li>
                                <li id="reqSpecial">✓ Хотя бы один спецсимвол (!@#$%^&*)</li>
                            </ul>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="confirm_password">Подтвердите пароль</label>
                        <div class="password-container">
                            <input type="password" id="confirm_password" name="confirm_password" required>
                            <span class="toggle-password" onclick="togglePassword('confirm_password')">👁️</span>
                        </div>
                        <div id="passwordMatch" class="error-message"></div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary" style="width: 100%;" id="submitBtn">Сбросить пароль</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Получаем токен из URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        function togglePassword(fieldId) {
            const field = document.getElementById(fieldId);
            const type = field.type === 'password' ? 'text' : 'password';
            field.type = type;
            event.target.textContent = type === 'password' ? '👁️' : '👁️‍🗨️';
        }

        // Функция проверки пароля
        function validatePassword(password) {
            const checks = {
                length: password.length >= 6,
                latin: /^[a-zA-Z0-9!@#$%^&*]+$/.test(password),
                uppercase: /[A-Z]/.test(password),
                lowercase: /[a-z]/.test(password),
                number: /[0-9]/.test(password),
                special: /[!@#$%^&*]/.test(password)
            };
            
            // Обновляем индикаторы требований
            updateRequirementIndicator('reqLength', checks.length);
            updateRequirementIndicator('reqLatin', checks.latin);
            updateRequirementIndicator('reqUppercase', checks.uppercase);
            updateRequirementIndicator('reqLowercase', checks.lowercase);
            updateRequirementIndicator('reqNumber', checks.number);
            updateRequirementIndicator('reqSpecial', checks.special);
            
            // Подсчет силы пароля
            let strength = 0;
            if (checks.length) strength++;
            if (checks.latin) strength++;
            if (checks.uppercase) strength++;
            if (checks.lowercase) strength++;
            if (checks.number) strength++;
            if (checks.special) strength++;
            
            // Обновляем индикатор силы
            const strengthDiv = document.getElementById('passwordStrength');
            if (password.length === 0) {
                strengthDiv.textContent = '';
                strengthDiv.className = 'password-strength';
            } else if (strength <= 2) {
                strengthDiv.textContent = '❌ Слабый пароль';
                strengthDiv.className = 'password-strength weak';
            } else if (strength <= 4) {
                strengthDiv.textContent = '⚠️ Средний пароль';
                strengthDiv.className = 'password-strength medium';
            } else {
                strengthDiv.textContent = '✅ Сильный пароль';
                strengthDiv.className = 'password-strength strong';
            }
            
            return checks;
        }
        
        function updateRequirementIndicator(id, isValid) {
            const element = document.getElementById(id);
            if (isValid) {
                element.classList.add('valid');
                element.innerHTML = element.innerHTML.replace('✓', '✅');
            } else {
                element.classList.remove('valid');
                element.innerHTML = element.innerHTML.replace('✅', '✓');
            }
        }
        
        // Функция проверки совпадения паролей
        function checkPasswordMatch() {
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm_password').value;
            const matchDiv = document.getElementById('passwordMatch');
            
            if (confirm.length === 0) {
                matchDiv.textContent = '';
                return false;
            }
            
            if (password === confirm) {
                matchDiv.className = 'success-message';
                matchDiv.textContent = '✓ Пароли совпадают';
                return true;
            } else {
                matchDiv.className = 'error-message';
                matchDiv.textContent = '✗ Пароли не совпадают';
                return false;
            }
        }
        
        // Функция полной валидации пароля
        function isPasswordValid(password) {
            const checks = validatePassword(password);
            return checks.length && checks.latin && checks.uppercase && checks.lowercase && checks.number && checks.special;
        }

        // Обработчики ввода
        document.getElementById('password').addEventListener('input', function() {
            validatePassword(this.value);
            checkPasswordMatch();
        });
        
        document.getElementById('confirm_password').addEventListener('input', checkPasswordMatch);

        document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm_password').value;
            
            if (password !== confirm) {
                showAlert('Пароли не совпадают', 'error');
                return;
            }
            
            if (!isPasswordValid(password)) {
                showAlert('Пароль не соответствует требованиям безопасности', 'error');
                return;
            }
            
            // Блокируем кнопку
            const submitBtn = document.getElementById('submitBtn');
            const originalText = submitBtn.textContent;
            submitBtn.disabled = true;
            submitBtn.textContent = '⏳ Отправка...';
            
            try {
                const response = await fetch('/auth/reset-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ token, password })
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    showAlert('✅ Пароль успешно изменен! Перенаправление...', 'success');
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 2000);
                } else {
                    showAlert(result.error || 'Ошибка при сбросе пароля', 'error');
                    submitBtn.disabled = false;
                    submitBtn.textContent = originalText;
                }
                
            } catch (error) {
                console.error('Ошибка:', error);
                showAlert('Ошибка соединения с сервером', 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = originalText;
            }
        });
        
        function showAlert(message, type) {
            const alert = document.getElementById('alert');
            alert.textContent = message;
            alert.className = `alert alert-${type}`;
            alert.style.display = 'block';
            
            setTimeout(() => {
                alert.style.display = 'none';
            }, 5000);
        }
    </script>
</body>
</html>
