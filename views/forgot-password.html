<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Восстановление пароля</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/logo.css">
    <style>
        .vk-icon {
            width: 30px;
            height: 30px;
            vertical-align: middle;
            margin-right: 10px;
        }
        .info-box {
            background: #e3f2fd;
            border-left: 4px solid #4a76a8;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="/" class="logo-container">
                <img src="/images/company1.png" alt="Компания 1" class="logo-image">
                    <span class="logo-cross logo-cross-black"></span>
                    <img src="/images/company2.png" alt="Компания 2" class="logo-image logo-text">
            </a>
            <div class="nav-links">
                <a href="/" > Главная</a>
                <a href="/login" class="active">Вход</a>
                <a href="/register">Регистрация</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div style="max-width: 400px; margin: 50px auto;">
            <div class="card">
                <div class="card-header">
                    <h2>Восстановление пароля</h2>
                </div>
                
                <div class="info-box">
                    <img src="/images/vk-icon.png" alt="VK" class="vk-icon">
                    <strong>Как это работает?</strong>
                    <p style="margin-top: 10px;">Мы отправим ссылку для сброса пароля в личные сообщения боту ВКонтакте. Для этого нужен VK ID, указанный при регистрации.</p>
                </div>
                
                <div id="alert" class="alert" style="display: none;"></div>
                
                <form id="forgotPasswordForm">
                    <div class="form-group">
                        <label for="vk_id">VK ID</label>
                        <input type="text" id="vk_id" name="vk_id" required 
                               placeholder="@durov или 12345678"
                               pattern="^(@?[a-zA-Z0-9_.]+|\d+)$">
                        <small>Введите VK ID, который использовали при регистрации</small>
                    </div>
                    
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Отправить ссылку</button>
                </form>
                
                <p style="text-align: center; margin-top: 20px;">
                    <a href="/login">← Вернуться ко входу</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('forgotPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const vkId = document.getElementById('vk_id').value;
            
            try {
                const response = await fetch('/auth/forgot-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ vk_id: vkId })
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    showAlert('✅ Ссылка для сброса пароля отправлена в VK! Проверьте сообщения от бота.', 'success');
                } else {
                    showAlert(result.error || 'Ошибка при отправке', 'error');
                }
                
            } catch (error) {
                console.error('Ошибка:', error);
                showAlert('Ошибка соединения с сервером', 'error');
            }
        });
        
        function showAlert(message, type) {
            const alert = document.getElementById('alert');
            alert.textContent = message;
            alert.className = `alert alert-${type}`;
            alert.style.display = 'block';
            
            setTimeout(() => {
                alert.style.display = 'none';
            }, 5000);
        }
    </script>
</body>
</html>
