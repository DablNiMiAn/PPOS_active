<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - Рейтинг активистов</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/logo.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="/" class="logo-container">
                <img src="/images/company1.png" alt="Компания 1" class="logo-image">
                    <span class="logo-cross"></span>
                    <img src="/images/company2.png" alt="Компания 2" class="logo-image logo-text">
            </a>
            <div class="nav-links">
                <a href="/">Главная</a>
                <a href="/login" class="active">Вход</a>
                <a href="/register">Регистрация</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div style="max-width: 400px; margin: 50px auto;">
            <div class="card">
                <div class="card-header">
                    <h2>Вход в систему</h2>
                </div>
                
                <div id="alert" class="alert" style="display: none;"></div>
                
                <form id="loginForm">
                    <div class="form-group">
                        <label for="username">Имя пользователя</label>
                        <input type="text" id="username" name="username" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Пароль</label>
                        <input type="password" id="password" name="password" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Войти</button>
                </form>
                
                <p style="text-align: center; margin-top: 20px;">
                    Нет аккаунта? <a href="/register">Зарегистрируйтесь</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);
            
            try {
                const response = await fetch('/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    window.location.href = result.redirect;
                } else {
                    showAlert(result.error, 'error');
                }
            } catch (error) {
                showAlert('Ошибка соединения с сервером', 'error');
            }
        });
        
        function showAlert(message, type) {
            const alert = document.getElementById('alert');
            alert.textContent = message;
            alert.className = `alert alert-${type}`;
            alert.style.display = 'block';
        }
    </script>
</body>
</html>
